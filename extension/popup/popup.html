<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <h1>Secrets Spotter</h1>
    <div id="loading">Loading findings<span class="dots"></span></div>
    <div id="results" class="hidden">
      <div id="scan-indicator" class="hidden">Scanning page<span class="dots"></span></div>
      <div id="status"></div>
      <div id="summary"></div>
      <ul id="findings-list"></ul>
      <div id="no-findings" class="hidden">No secrets detected on this page.</div>
    </div>
    <details id="debug-section">
      <summary>Debug Log</summary>
      <div id="debug-log-content"></div>
      <button id="clear-log-btn" class="hidden">Clear</button>
    </details>
  </div>
  <script src="popup.js"></script>
</body>
</html>
