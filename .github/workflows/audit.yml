name: audit

# Dependency-tree audits (cargo-audit / npm audit). These answer "did the
# *world* change?" — a newly published advisory reddens them with no change to
# this repo — so they run on a daily clock plus the PRs and pushes that change
# the dependency tree, instead of on every PR. The PR-attributable security
# checks (dependency-review, CodeQL) live in security.yml.
#
# A scheduled failure files (or updates) a single tracking issue via the alert
# job below; without that, a red cron dies unseen in the Actions tab.

on:
  schedule:
    - cron: "0 5 * * *" # daily 05:00 UTC (scorecard Mon 04:00, security Mon 06:00, stale 07:00)
  workflow_dispatch:
  pull_request:
    # GitHub Actions YAML has no anchors — keep this list and the push list
    # below identical. Every file that pins a dependency version.
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "fuzz/Cargo.toml"
      - "fuzz/Cargo.lock"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/audit.yml"
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "fuzz/Cargo.toml"
      - "fuzz/Cargo.lock"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/audit.yml"

concurrency:
  group: audit-${{ github.ref }}
  # PRs cancel superseded runs; main-ref runs (pushes and the daily cron
  # share this group) queue instead.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        # Prebuilt, checksum-verified binary — `cargo install` compiled it from
        # source on every run (~3 min of the old security-workflow wall clock).
        # Deliberately manual tool pin (no Dependabot ecosystem); the daily
        # cron exercises it, so a stale/broken pin is loud.
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-audit@0.22.2
      - name: Audit the workspace lockfile
        run: cargo audit --deny warnings
      - name: Audit the fuzz workspace lockfile
        # fuzz/ is a standalone workspace with its own committed lock; the
        # default invocation above only reads ./Cargo.lock.
        run: cargo audit --deny warnings --file fuzz/Cargo.lock

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Audit the npm lockfile
        # Lockfile-only: npm audit posts the lock graph to the registry's
        # advisory endpoint — no install needed. --audit-level=high because
        # these are dev-only test-harness deps (vitest/happy-dom); low and
        # moderate advisories in test tooling shouldn't page anyone.
        # Dependabot is the mover that keeps the pins themselves fresh.
        run: npm audit --audit-level=high

  alert:
    name: file tracking issue
    needs: [cargo-audit, npm-audit]
    # Runs on every SCHEDULED outcome: a failure files (or refreshes) the
    # tracking issue; a success closes it. The issue therefore exists exactly
    # while the audit is red — self-creating, self-cleaning, at most one open
    # at a time. PR and dispatch runs never touch issues (a human is watching
    # those). Cancelled/skipped results are no-ops.
    if: ${{ always() && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Sync the audit-failure issue to the run result
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CARGO_RESULT: ${{ needs.cargo-audit.result }}
          NPM_RESULT: ${{ needs.npm-audit.result }}
        run: |
          existing=$(gh issue list --label audit-failure --state open \
            --json number --jq '.[0].number // empty')
          if [ "$CARGO_RESULT" = "failure" ] || [ "$NPM_RESULT" = "failure" ]; then
            gh label create audit-failure --color D93F0B \
              --description "Scheduled dependency audit is failing" --force
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --body "Scheduled audit still failing: $RUN_URL"
            else
              gh issue create --title "Scheduled dependency audit failing" \
                --label audit-failure \
                --body "The daily \`cargo audit\` / \`npm audit\` run failed — most likely a new advisory against a pinned dependency. Run: $RUN_URL"
            fi
          elif [ "$CARGO_RESULT" = "success" ] && [ "$NPM_RESULT" = "success" ]; then
            if [ -n "$existing" ]; then
              gh issue close "$existing" \
                --comment "Resolved — the scheduled audit is green again: $RUN_URL"
            fi
          fi
