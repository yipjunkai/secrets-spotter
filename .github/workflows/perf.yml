name: perf

# Scan-throughput regression gate. Benches the PR's base ref and the PR head on
# the SAME runner, then fails if any benchmark regressed past PERF_THRESHOLD.
# Benching both refs on one machine cancels cross-runner variance, which a
# stored historical baseline cannot. The first PR that introduces the bench
# harness bootstraps the baselines — comparisons begin with the next PR.
#
# Intentionally NOT wired into the required `ci-passed` aggregator (verify.yml):
# advisory until the real noise floor on these runners is trusted, then promote
# it to a required check in branch protection.

on:
  pull_request:
    paths:
      - "crates/core/src/**"
      - "crates/core/benches/**"
      - "crates/core/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/perf.yml"
      - ".github/scripts/perf-diff.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    name: perf-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Regression ceiling as a fraction (0.10 = 10%). GitHub-hosted runner
      # noise is typically 3-8%; this catches real regressions while absorbing it.
      PERF_THRESHOLD: "0.10"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Both base and head must be reachable locally to bench each in turn.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: perf

      # Bench the PR head first (where actions/checkout leaves the tree).
      - name: Bench PR head (baseline=head)
        run: cargo bench -p secrets-spotter-core --bench scan -- --save-baseline head

      # Bench the PR's base ref on the same runner. Tolerated to fail on the
      # bootstrap PR, where the bench does not yet exist on the base ref.
      - name: Bench base ref (baseline=base)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -e
          git fetch origin "$BASE_REF" --depth=1
          # Detached + forced: discard any Cargo.lock metadata rewrite from the
          # head bench. target/criterion/ is untouched by checkout, so the head
          # baseline survives.
          git checkout -f --detach "origin/$BASE_REF"
          if [ ! -f crates/core/benches/scan.rs ]; then
            echo "::notice::no benches/scan.rs on base ref; bootstrapping baselines this run."
            exit 0
          fi
          cargo bench -p secrets-spotter-core --bench scan -- --save-baseline base

      # Return to the PR head so the comparator script is present (it may not
      # exist on the base ref). Criterion baselines persist across checkouts.
      - name: Restore PR head
        if: always() && github.event_name == 'pull_request'
        run: git checkout -f --detach "$GITHUB_SHA"

      - name: Compare baselines
        run: bash .github/scripts/perf-diff.sh base head "$PERF_THRESHOLD"
