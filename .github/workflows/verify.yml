name: Verify Code

on:
  # No paths-ignore: branch protection requires the "ci-passed" check, which
  # would never report on a paths-ignored (docs-only) PR and deadlock the merge.
  # Instead the "changes" job detects docs-only changes and the heavy jobs skip
  # themselves, while ci-passed still runs and reports.
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs, but never on main: every main commit keeps
  # its own verdict — a cancelled run leaves a commit unbisectable.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Detect whether any non-docs file changed; lint/build/test gate on this so a
  # docs-only PR skips compile/test while ci-passed still reports.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # workflow_dispatch is a human explicitly requesting a run — never gate it.
      # (paths-filter would otherwise diff only the tip commit on dispatch.)
      code: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.code }}
      # No dispatch override here: the perf job is PR-only anyway (it benches
      # base-vs-head, which needs a base ref to compare against).
      perf: ${{ steps.filter-perf.outputs.perf }}
    steps:
      # paths-filter resolves pull_request events via the GitHub API but uses
      # local git for push (and dispatch) events, so the repo must be checked
      # out first — without it, every push to main failed with git exit 128.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # paths-filter's push-path git fetch works anonymously (public repo).
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # 'every': a file counts as code only if it matches ALL patterns —
          # '**' AND each negated docs glob. Under the default 'some', '**'
          # matches everything and the negations are dead letters, so docs-only
          # PRs have silently run the full suite since the gate landed in #12.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!LICENSE*'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter-perf
        with:
          # Separate step: the 'code' filter above needs quantifier 'every' for
          # its negations, while this positive list needs the default 'some'
          # (any one match counts) — and the quantifier is step-global.
          filters: |
            perf:
              - 'crates/core/src/**'
              - 'crates/core/benches/**'
              - 'crates/core/Cargo.toml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/scripts/perf-diff.sh'
              - '.github/workflows/verify.yml'

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          extra_args: --results=verified,unknown

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: extension/manifest.json version matches Cargo.toml
        shell: bash
        run: |
          CARGO=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          MANIFEST=$(grep -m1 '"version"' extension/manifest.json | sed -E 's/.*"version"[^"]*"([^"]+)".*/\1/')
          echo "Cargo.toml=$CARGO  extension/manifest.json=$MANIFEST"
          if [ "$CARGO" != "$MANIFEST" ]; then
            echo "::error::Version mismatch — Cargo.toml=$CARGO, extension/manifest.json=$MANIFEST. Keep them in sync."
            exit 1
          fi

  lint-and-format:
    name: Lint and Format
    needs: changes
    if: ${{ needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Lockfile sync check
        # Errors if Cargo.lock would need updating — a PR that edits Cargo.toml
        # without committing the lock fails here instead of CI silently
        # re-resolving deps the repo never tested. Also warms the cargo cache.
        run: cargo fetch --locked
      - name: Check formatting and lint
        run: just lint
      - name: actionlint
        # Version-pinned and checksum-verified: a tampered release asset
        # fails sha256sum -c instead of running inside the lint gate.
        # Deliberately manual pin (no Dependabot ecosystem covers it) —
        # this step runs on every code PR, so a stale/broken pin is loud.
        run: |
          curl -sL -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum -c
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

  build:
    name: Build
    # needs only the gate — lint runs in parallel. It still gates the merge
    # via ci-passed's needs; it just doesn't delay the build from starting.
    needs: changes
    if: ${{ needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      # Prebuilt, checksum-verified wasm-pack. Replaces jetli/wasm-pack-action:
      # unmaintained since 2022, declares the node16 runtime (forced onto
      # node24 on June 16, 2026), and floated on wasm-pack latest — this pins.
      # The tool version is a deliberately manual pin (install-action tool
      # strings have no Dependabot ecosystem); exercised on every code PR.
      - name: Install wasm-pack
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: wasm-pack@0.15.0
      - name: Build
        run: just build
      # Gate 2: fail the build if the shipped wasm exceeds its size budget —
      # the deterministic counterpart to the perf job's throughput gate.
      - name: WASM size budget
        run: just check-wasm-size

  test:
    name: Test (${{ matrix.os }})
    # needs only the gate — see the build job's note.
    needs: changes
    if: ${{ needs.changes.outputs.code != 'false' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      # Run all OSes to completion so one platform's failure doesn't hide another.
      fail-fast: false
      matrix:
        # The OSes we ship release binaries for.
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Run tests
        run: just test
      # The dogfood scan is a source-hygiene check (OS-independent) — run it once.
      - name: Dogfood — scan own source for contiguous secret-shaped fixtures
        if: matrix.os == 'ubuntu-latest'
        run: just scan-self

  test-js:
    name: Extension JS tests
    needs: changes
    if: ${{ needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run extension JS tests (vitest)
        run: npm test

  msrv:
    name: MSRV
    # The minimum supported Rust version is a contract for `cargo install`
    # users; without this gate any PR can silently raise it.
    needs: changes
    if: ${{ needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          # Keep in sync with rust-version in Cargo.toml ([workspace.package]).
          toolchain: "1.87"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --workspace --all-targets

  perf:
    name: perf-gate
    # Scan-throughput regression gate (folded in from the old perf.yml).
    # Benches the PR's base ref and the PR head on the SAME runner, then fails
    # if any benchmark regressed past PERF_THRESHOLD. Benching both refs on
    # one machine cancels cross-runner variance, which a stored historical
    # baseline cannot.
    #
    # PR-only: the comparison needs a base ref. Release PRs are skipped — a
    # version bump can't change scan throughput, and the bot would otherwise
    # bench twice per release (open + lock-sync force-push). Fail-closed
    # (== 'true', unlike the code jobs' != 'false') on purpose: an advisory
    # bench should skip on a filter hiccup, not spend 3 min on every PR.
    needs: changes
    if: >-
      github.event_name == 'pull_request' &&
      needs.changes.outputs.perf == 'true' &&
      github.actor != 'secrets-spotter-release-bot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Regression ceiling as a fraction (0.10 = 10%). GitHub-hosted runner
      # noise is typically 3-8%; this catches real regressions while absorbing it.
      PERF_THRESHOLD: "0.10"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Both base and head must be reachable locally to bench each in turn.
          # The mid-job base-ref fetch works anonymously (public repo).
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: perf

      # Bench the PR head first (where actions/checkout leaves the tree).
      - name: Bench PR head (baseline=head)
        run: cargo bench -p secrets-spotter-core --bench scan -- --save-baseline head

      # Bench the PR's base ref on the same runner. Tolerated to fail on a
      # bootstrap PR, where the bench does not yet exist on the base ref.
      - name: Bench base ref (baseline=base)
        continue-on-error: true
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -e
          git fetch origin "$BASE_REF" --depth=1
          # Detached + forced: discard any Cargo.lock metadata rewrite from the
          # head bench. target/criterion/ is untouched by checkout, so the head
          # baseline survives.
          git checkout -f --detach "origin/$BASE_REF"
          if [ ! -f crates/core/benches/scan.rs ]; then
            echo "::notice::no benches/scan.rs on base ref; bootstrapping baselines this run."
            exit 0
          fi
          cargo bench -p secrets-spotter-core --bench scan -- --save-baseline base

      # Return to the PR head so the comparator script is present (it may not
      # exist on the base ref). Criterion baselines persist across checkouts.
      - name: Restore PR head
        if: always()
        run: git checkout -f --detach "$GITHUB_SHA"

      - name: Compare baselines
        run: bash .github/scripts/perf-diff.sh base head "$PERF_THRESHOLD"

  ci-passed:
    # Single check that branch protection can require, instead of listing each
    # job by name. Succeeds only if all needed jobs succeeded or were skipped;
    # fails if any failed or was cancelled. Runs even on partial failures.
    #
    # perf is deliberately NOT in needs while its noise floor is being trusted.
    # To promote it to required: add 'perf' to the needs list below — skipped
    # runs count as success here, so non-perf PRs still pass. Never promote it
    # via branch protection instead: a paths-gated check that doesn't report
    # would deadlock the merge (see the header comment).
    name: ci-passed
    if: ${{ always() }}
    needs: [changes, secret-scanning, version-check, lint-and-format, build, test, test-js, msrv]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate required-job results
        env:
          NEEDS_RESULT: ${{ toJSON(needs) }}
        run: |
          set -e
          echo "$NEEDS_RESULT" | jq -r 'to_entries[] | "\(.key)\t\(.value.result)"'
          if echo "$NEEDS_RESULT" | jq -e 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled")' > /dev/null; then
            echo "::error::At least one required job failed or was cancelled."
            exit 1
          fi
          echo "All required jobs passed."
