name: Verify Code

on:
  # No paths-ignore here on purpose: branch protection requires the "ci-passed"
  # check, and a paths-ignored (e.g. docs-only) PR would never trigger this
  # workflow, so that required check would never report and the PR would
  # deadlock. Running the full pipeline on docs-only PRs is the cheaper tradeoff.
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          extra_args: --results=verified,unknown

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: extension/manifest.json version matches Cargo.toml
        shell: bash
        run: |
          CARGO=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          MANIFEST=$(grep -m1 '"version"' extension/manifest.json | sed -E 's/.*"version"[^"]*"([^"]+)".*/\1/')
          echo "Cargo.toml=$CARGO  extension/manifest.json=$MANIFEST"
          if [ "$CARGO" != "$MANIFEST" ]; then
            echo "::error::Version mismatch — Cargo.toml=$CARGO, extension/manifest.json=$MANIFEST. Keep them in sync."
            exit 1
          fi

  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Check formatting and lint
        run: just lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
      - name: Build
        run: just build

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Run tests
        run: just test
      - name: Dogfood — scan own source for contiguous secret-shaped fixtures
        run: just scan-self

  ci-passed:
    # Single check that branch protection can require, instead of listing each
    # job by name. Succeeds only if all needed jobs succeeded; fails if any
    # failed or was cancelled. Runs even on partial failures (`if: always()`).
    name: ci-passed
    if: ${{ always() }}
    needs: [secret-scanning, version-check, lint-and-format, build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate required-job results
        env:
          NEEDS_RESULT: ${{ toJSON(needs) }}
        run: |
          set -e
          echo "$NEEDS_RESULT" | jq -r 'to_entries[] | "\(.key)\t\(.value.result)"'
          if echo "$NEEDS_RESULT" | jq -e 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled")' > /dev/null; then
            echo "::error::At least one required job failed or was cancelled."
            exit 1
          fi
          echo "All required jobs passed."
