name: Verify Code

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - LICENSE-*
      - README.md
      - TODO.md

concurrency:
  group: verify-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy (native)
        run: cargo clippy -p secrets-spotter-core -p secrets-spotter -- -D warnings
      - name: Run clippy (wasm)
        run: cargo clippy -p secrets-spotter-wasm --target wasm32-unknown-unknown -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
      - name: Build CLI
        run: cargo build --release -p secrets-spotter
      - name: Build WASM
        run: wasm-pack build crates/wasm --target web --out-dir ../../extension/wasm --release

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace
