name: security

# PR-attributable security checks: dependency-review diffs the dependency
# changes a PR itself introduces; CodeQL scans the code at this commit. Both
# are deterministic for a given diff. The dependency-tree audits (cargo-audit
# / npm audit) — which go red when a new upstream advisory is published, with
# no change to this repo — live in audit.yml on a daily schedule plus
# dependency-file paths.
#
# paths-ignore is safe here because branch protection requires only verify's
# ci-passed: on a docs-only PR these checks simply don't report.

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENSE*"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE*"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  schedule:
    - cron: "0 6 * * 1" # weekly Monday — picks up new CodeQL query packs
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  codeql-javascript:
    name: codeql (javascript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: javascript
