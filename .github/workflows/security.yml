name: security

# PR-attributable security checks: dependency-review diffs the dependency
# changes a PR itself introduces; CodeQL scans the code at this commit. Both
# are deterministic for a given diff. The dependency-tree audits (cargo-audit
# / npm audit) — which go red when a new upstream advisory is published, with
# no change to this repo — live in audit.yml on a daily schedule plus
# dependency-file paths.
#
# paths-ignore is safe here because branch protection requires only verify's
# ci-passed: on a docs-only PR these checks simply don't report.

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENSE*"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE*"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  schedule:
    - cron: "0 6 * * 1" # weekly Monday — picks up new CodeQL query packs
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs, but never on main — same rationale as
  # verify.yml: every main commit keeps its own verdict.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  codeql:
    name: codeql (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      # One language's failure shouldn't hide another's findings.
      fail-fast: false
      matrix:
        # javascript = the extension; actions = the workflows themselves
        # (injection patterns); rust = the core scanner.
        language: [javascript, actions, rust]
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: ${{ matrix.language }}
