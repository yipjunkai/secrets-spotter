name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-core

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM
        working-directory: rust-core
        run: wasm-pack build --target web --out-dir ../extension/wasm --release

      - name: Clean wasm-pack artifacts
        run: rm -f extension/wasm/.gitignore \
          extension/wasm/package.json \
          extension/wasm/*.d.ts

      - name: Copy licenses and README
        run: cp LICENSE-APACHE LICENSE-MIT README.md extension/

      - name: Package extension
        run: cd extension && zip -r ../secrets-spotter-${{ github.ref_name }}.zip .

      - name: Generate checksum
        shell: bash
        run: |
          ARCHIVE="secrets-spotter-${{ github.ref_name }}.zip"
          HASH=$(sha256sum "$ARCHIVE" | cut -d ' ' -f 1)
          echo "secrets-spotter-${{ github.ref_name }}.zip|$ARCHIVE|$HASH" > checksum.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}
          path: |
            secrets-spotter-${{ github.ref_name }}.zip
            checksum.txt
          retention-days: 7

  release:
    name: Upload to Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from Cargo.toml
        id: cargo_version
        shell: bash
        run: |
          VERSION=$(grep '^version' rust-core/Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.cargo_version.outputs.version }}
          body: |
            Release ${{ steps.cargo_version.outputs.version }}
          files: |
            secrets-spotter-${{ github.ref_name }}.zip
            checksum.txt
          draft: false
          prerelease: false
          generate_release_notes: false
