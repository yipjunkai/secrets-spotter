name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Gate the release on the same lint + tests as CI, so a tag pushed to a
  # broken commit can't publish artifacts.
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3
      - name: Lint and test
        run: |
          just lint
          just test

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: secrets-spotter
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: secrets-spotter
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: secrets-spotter
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: secrets-spotter.exe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build CLI
        run: cargo build --release -p secrets-spotter --target ${{ matrix.target }}

      - name: Package CLI
        shell: bash
        run: |
          ARCHIVE="secrets-spotter-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$ARCHIVE"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$ARCHIVE/"
          cp LICENSE-APACHE LICENSE-MIT "$ARCHIVE/"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "$ARCHIVE.zip" "$ARCHIVE"
          else
            tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cli-${{ matrix.target }}
          path: secrets-spotter-${{ github.ref_name }}-${{ matrix.target }}.*
          retention-days: 7

  build-extension:
    name: Build Extension
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0

      - name: Build WASM
        run: just build-wasm

      - name: Copy licenses and README
        run: cp LICENSE-APACHE LICENSE-MIT README.md extension/

      - name: Package extension
        run: cd extension && zip -r ../secrets-spotter-extension-${{ github.ref_name }}.zip .

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: extension
          path: secrets-spotter-extension-${{ github.ref_name }}.zip
          retention-days: 7

  release:
    name: Upload to Release
    needs: [build-cli, build-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # for build provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Extract version from Cargo.toml
        id: cargo_version
        shell: bash
        run: |
          VERSION=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version *= *"\(.*\)"/\1/p }' Cargo.toml)
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release && sha256sum ./* > checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            release/*.tar.gz
            release/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.cargo_version.outputs.version }}
          body: |
            Release ${{ steps.cargo_version.outputs.version }}
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: false
