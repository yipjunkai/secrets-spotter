name: Release

# Fires on the vX.Y.Z tag that release-please.yml creates when a release PR is
# merged. Re-runs lint + tests, builds the CLI (4 targets) and the extension,
# attests build provenance, and uploads everything to the GitHub release that
# release-please created for the tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

# Serialize the whole release pipeline: a re-run or a rapid second tag queues
# behind the in-flight run instead of racing it to the asset upload. No
# cancel-in-progress — never kill a half-done publish.
concurrency:
  group: release

jobs:
  # Gate the release on the same lint + tests as CI, so a tag on a broken
  # commit can't publish artifacts.
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
      - name: Lockfile sync check
        # Tag-time builds must never re-resolve dependencies CI didn't test:
        # errors if Cargo.lock is stale, and warms the cache. The build jobs
        # below run --locked / build from this same validated commit.
        run: cargo fetch --locked
      - name: Lint and test
        run: |
          just lint
          just test
      - name: Extension JS tests
        # The release packages the extension — gate its JS too, not just Rust.
        run: |
          npm ci
          npm test

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: check
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: secrets-spotter
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: secrets-spotter
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: secrets-spotter
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: secrets-spotter.exe
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build CLI
        run: cargo build --profile release-cli --locked -p secrets-spotter --target ${{ matrix.target }}
      - name: Package CLI
        shell: bash
        run: |
          ARCHIVE="secrets-spotter-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$ARCHIVE"
          cp "target/${{ matrix.target }}/release-cli/${{ matrix.artifact }}" "$ARCHIVE/"
          cp LICENSE-APACHE LICENSE-MIT "$ARCHIVE/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$ARCHIVE.zip" "$ARCHIVE"
          else
            tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cli-${{ matrix.target }}
          path: secrets-spotter-${{ github.ref_name }}-${{ matrix.target }}.*
          retention-days: 1

  build-extension:
    name: Build Extension
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      # Prebuilt, checksum-verified wasm-pack — same pin as verify.yml; the
      # replaced jetli action was unmaintained (node16) and floated on latest.
      - name: Install wasm-pack
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: wasm-pack@0.15.0
      - name: Lockfile sync check
        # wasm-pack drives cargo internally (no --locked passthrough); enforce
        # the committed lock here instead, same as fuzz-style workspaces do.
        run: cargo fetch --locked
      - name: Build WASM
        run: just build-wasm
      - name: Copy licenses and README
        run: cp LICENSE-APACHE LICENSE-MIT README.md extension/
      - name: Package extension
        run: cd extension && zip -r ../secrets-spotter-extension-${{ github.ref_name }}.zip .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: extension
          path: secrets-spotter-extension-${{ github.ref_name }}.zip
          retention-days: 1

  publish:
    name: Attach assets to release
    needs: [build-cli, build-extension]
    # Tag pushes only: ANY workflow_dispatch (even from a tag ref) is a
    # build-only dry run — everything compiles and packages, nothing is
    # published. Publishing happens solely via the release-please tag push.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write # for build provenance attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          # Hash only the archives (not checksums.txt itself); ./ prefix avoids shellcheck SC2035.
          cd release && sha256sum ./*.tar.gz ./*.zip > checksums.txt
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release/*.tar.gz
            release/*.zip
      - name: Upload assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
        # No checkout in this job, so gh can't infer the repo from a git remote —
        # pass --repo explicitly or it aborts with "fatal: not a git repository".
        run: gh release upload "${{ github.ref_name }}" release/* --clobber --repo "${{ github.repository }}"
