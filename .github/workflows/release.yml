name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: secrets-spotter
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: secrets-spotter
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: secrets-spotter
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: secrets-spotter.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p secrets-spotter --target ${{ matrix.target }}

      - name: Package CLI
        shell: bash
        run: |
          ARCHIVE="secrets-spotter-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$ARCHIVE"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$ARCHIVE/"
          cp LICENSE-APACHE LICENSE-MIT "$ARCHIVE/"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "$ARCHIVE.zip" "$ARCHIVE"
          else
            tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"
          fi

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: secrets-spotter-${{ github.ref_name }}-${{ matrix.target }}.*
          retention-days: 7

  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM
        run: wasm-pack build crates/wasm --target web --out-dir ../../extension/wasm --release

      - name: Clean wasm-pack artifacts
        run: rm -f extension/wasm/.gitignore extension/wasm/package.json extension/wasm/*.d.ts

      - name: Copy licenses and README
        run: cp LICENSE-APACHE LICENSE-MIT README.md extension/

      - name: Package extension
        run: cd extension && zip -r ../secrets-spotter-extension-${{ github.ref_name }}.zip .

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: secrets-spotter-extension-${{ github.ref_name }}.zip
          retention-days: 7

  release:
    name: Upload to Release
    needs: [build-cli, build-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from Cargo.toml
        id: cargo_version
        shell: bash
        run: |
          VERSION=$(grep '^version' crates/core/Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release && sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.cargo_version.outputs.version }}
          body: |
            Release ${{ steps.cargo_version.outputs.version }}
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: false
