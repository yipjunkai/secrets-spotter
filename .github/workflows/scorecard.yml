name: scorecard

# OSSF Scorecard publishes a security posture score to securityscorecards.dev.
# Results are uploaded as SARIF to GitHub Code Scanning, so findings appear in
# the repo's Security tab in addition to the public badge.
#
# The first run after pushing populates the badge URL at
# https://api.securityscorecards.dev/projects/github.com/yipjunkai/secrets-spotter/badge.

on:
  branch_protection_rule:
  schedule:
    - cron: "0 4 * * 1" # weekly Monday 04:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions per OSSF Scorecard recommendation; per-job elevations below.
permissions: read-all

jobs:
  analysis:
    name: scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload SARIF to GitHub Code Scanning
      id-token: write # OIDC token to publish results to OSSF
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: results.sarif

      - name: Upload SARIF as artifact (debug/audit)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5
