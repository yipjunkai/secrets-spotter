name: stale

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          # Bug reports and security issues are explicitly exempt from auto-staling —
          # quietly closing real bugs is the failure mode that erodes user trust.
          exempt-issue-labels: "bug,security,help wanted,pinned,roadmap"
          exempt-pr-labels: "pinned,security"
          days-before-issue-stale: 60
          days-before-issue-close: 30
          stale-issue-message: >
            This issue has been inactive for 60 days. If still relevant, please
            comment or add more context; otherwise it will be closed in 30 days.
          close-issue-message: >
            Closed as stale. Reopen any time with new information.
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-message: >
            This PR has been inactive for 30 days. Please rebase or comment to keep open.
          close-pr-message: >
            Closed as stale. Reopen any time.
