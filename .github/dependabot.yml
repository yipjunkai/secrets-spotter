version: 2

updates:
  # GitHub Actions: weekly grouped bumps. Group related actions to reduce PR noise.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      gha-minor:
        update-types: [minor, patch]
      gha-major:
        update-types: [major]
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: scope

  # Rust deps (Cargo).
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      rust-minor:
        update-types: [minor, patch]
      rust-major:
        update-types: [major]
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: scope
